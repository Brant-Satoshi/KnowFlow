name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR branch).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # pnpm version comes from package.json "packageManager"; do not also pass
      # a `version` input here or action-setup errors on the mismatch.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm test:unit

      # Placeholder env, NOT secrets: pg.ts and supabase.ts read these at module
      # import time, so `next build` needs them present to collect routes. The
      # values are never used to open a connection during the build, so fake
      # (but well-formed) values are sufficient and safe to commit.
      - run: pnpm build
        env:
          DATABASE_URL: postgres://ci:ci@localhost:5432/ci
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
